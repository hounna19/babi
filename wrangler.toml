name = "twiceday"
main = "build/worker/shim.mjs"
compatibility_date = "2024-05-23"
minify = true

[[kv_namespaces]]
binding = "SIREN"
id = "3e3805dd8e8649b8a34b050eac663e98"

[build]
command = "cargo install worker-build@^0.1 && worker-build --release"

[env.dev]
build = { command = "cargo install worker-build@^0.1 && worker-build --dev" }

[vars]
UUID = "cb20a12f-2641-4b9f-9a49-926a1936861c"
MAIN_PAGE_URL = "https://raw.githubusercontent.com/hounna19/babi/refs/heads/main/web/index.html"
